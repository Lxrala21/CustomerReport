<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Login - Customer Report</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#111318">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #111318;
            color: #e8eaed;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }
        .wrap { text-align: center; padding: 24px; }
        h1 { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
        p { font-size: 13px; color: #9aa0a6; margin-bottom: 40px; }

        .nfc-btn {
            width: 160px; height: 160px;
            border-radius: 50%;
            border: 3px solid #2d3039;
            background: #1a1d23;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 0 auto 24px;
            cursor: pointer;
            position: relative;
            -webkit-tap-highlight-color: transparent;
            transition: border-color .3s, background .3s;
        }
        .nfc-btn svg { width: 48px; height: 48px; color: #9aa0a6; transition: color .3s; }
        .nfc-btn span { font-size: 11px; font-weight: 700; letter-spacing: .12em; color: #5f6368; transition: color .3s; }

        /* Scanning */
        .nfc-btn.scanning { border-color: #8ab4f8; background: rgba(138,180,248,.06); }
        .nfc-btn.scanning svg { color: #8ab4f8; animation: pulse 1.2s ease-in-out infinite; }
        .nfc-btn.scanning span { color: #8ab4f8; }
        .nfc-btn.scanning::before,
        .nfc-btn.scanning::after {
            content: ''; position: absolute; border-radius: 50%;
            border: 2px solid #8ab4f8; animation: ring 2s ease-out infinite;
        }
        .nfc-btn.scanning::before { width: 180px; height: 180px; }
        .nfc-btn.scanning::after { width: 210px; height: 210px; animation-delay: .5s; }

        /* OK */
        .nfc-btn.ok { border-color: #81c995; background: rgba(129,201,149,.08); }
        .nfc-btn.ok svg { color: #81c995; }
        .nfc-btn.ok span { color: #81c995; }

        /* Error */
        .nfc-btn.err { border-color: #f28b82; background: rgba(242,139,130,.06); animation: shake .4s; }
        .nfc-btn.err svg { color: #f28b82; }
        .nfc-btn.err span { color: #f28b82; }

        @keyframes pulse { 0%,100%{opacity:.6} 50%{opacity:1} }
        @keyframes ring { 0%{transform:scale(.9);opacity:.5} 100%{transform:scale(1.15);opacity:0} }
        @keyframes shake { 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }

        .msg { font-size: 14px; min-height: 20px; transition: color .3s; color: #5f6368; }
    </style>
</head>
<body>
<div class="wrap">
    <h1>Customer Report</h1>
    <p>Escanea tu tarjeta de acceso</p>

    <div class="nfc-btn" id="btn" onclick="scan()">
        <svg id="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M6 8.32a7.43 7.43 0 010 7.36"/>
            <path d="M9.46 6.21a11.76 11.76 0 010 11.58"/>
            <path d="M12.91 4.1a16.07 16.07 0 010 15.8"/>
            <path d="M16.37 2a20.4 20.4 0 010 20"/>
        </svg>
        <span id="label">ESCANEAR</span>
    </div>

    <div class="msg" id="msg">Toca el boton para leer tu tarjeta</div>
</div>

<script>
if (sessionStorage.getItem('cr_user')) window.location.href = '/';

const API = window.location.origin + '/api';
const btn = document.getElementById('btn');
const icon = document.getElementById('icon');
const label = document.getElementById('label');
const msg = document.getElementById('msg');
let reader, ctrl;

async function scan() {
    if (btn.classList.contains('scanning')) return;

    try {
        if (ctrl) ctrl.abort();
        ctrl = new AbortController();
        reader = new NDEFReader();
        await reader.scan({ signal: ctrl.signal });

        btn.className = 'nfc-btn scanning';
        label.textContent = 'LEYENDO...';
        msg.textContent = 'Acerca tu tarjeta al celular';
        msg.style.color = '#8ab4f8';
        if (navigator.vibrate) navigator.vibrate(50);

        reader.addEventListener('reading', async ({ serialNumber }) => {
            if (!serialNumber) return;
            const uid = serialNumber.toUpperCase();
            if (navigator.vibrate) navigator.vibrate([50, 30, 50]);

            btn.className = 'nfc-btn ok';
            icon.innerHTML = '<polyline points="20 6 9 17 4 12" stroke="currentColor" stroke-width="2.5" fill="none"/>';
            label.textContent = uid;
            msg.textContent = 'Verificando...';
            msg.style.color = '#81c995';

            try {
                const res = await fetch(API + '/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cardUID: uid }),
                });
                const data = await res.json();
                if (data.ok) {
                    if (ctrl) ctrl.abort();
                    msg.textContent = 'Bienvenido, ' + data.user.name;
                    if (navigator.vibrate) navigator.vibrate([50, 30, 100]);
                    sessionStorage.setItem('cr_user', JSON.stringify(data.user));
                    setTimeout(() => window.location.href = '/', 600);
                } else {
                    fail(data.error || 'Tarjeta no registrada');
                }
            } catch (e) {
                fail('Error de conexion');
            }
        });

        reader.addEventListener('readingerror', () => fail('Error al leer tarjeta'));

    } catch (err) {
        if (err.name === 'AbortError') return;
        fail(err.name === 'NotAllowedError' ? 'Activa NFC en ajustes' : 'NFC no disponible');
    }
}

function fail(m) {
    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
    btn.className = 'nfc-btn err';
    label.textContent = 'ERROR';
    msg.textContent = m;
    msg.style.color = '#f28b82';
    setTimeout(reset, 2500);
}

function reset() {
    btn.className = 'nfc-btn';
    icon.innerHTML = '<path d="M6 8.32a7.43 7.43 0 010 7.36"/><path d="M9.46 6.21a11.76 11.76 0 010 11.58"/><path d="M12.91 4.1a16.07 16.07 0 010 15.8"/><path d="M16.37 2a20.4 20.4 0 010 20"/>';
    label.textContent = 'ESCANEAR';
    msg.textContent = 'Toca el boton para leer tu tarjeta';
    msg.style.color = '#5f6368';
}
</script>
</body>
</html>
