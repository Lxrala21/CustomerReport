<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Login - Customer Report</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#111318">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #111318;
            --bg-card: #1a1d23;
            --border: #2d3039;
            --text: #e8eaed;
            --text-secondary: #bdc1c6;
            --text-muted: #9aa0a6;
            --accent: #8ab4f8;
            --accent-hover: #7aa5e8;
            --negative: #f28b82;
            --positive: #81c995;
            --radius: 12px;
            --shadow: 0 8px 32px rgba(0,0,0,.4);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            padding: 20px;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .login-icon {
            width: 72px; height: 72px;
            background: rgba(138,180,248,.1);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px;
        }
        .login-icon svg { width: 32px; height: 32px; color: var(--accent); }

        .login-title {
            font-size: 22px; font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.02em;
        }
        .login-sub {
            font-size: 14px; color: var(--text-muted);
            margin-bottom: 36px;
            line-height: 1.5;
        }

        .card-input-wrap {
            position: relative;
            margin-bottom: 20px;
        }

        .card-input {
            width: 100%;
            background: var(--bg);
            border: 2px solid var(--border);
            color: var(--text);
            padding: 16px 20px 16px 48px;
            border-radius: 10px;
            font-size: 16px;
            font-family: 'Inter', monospace;
            letter-spacing: 0.05em;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        .card-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(138,180,248,.15);
        }
        .card-input::placeholder { color: #5f6368; letter-spacing: 0; }

        .card-input-icon {
            position: absolute;
            left: 16px; top: 50%; transform: translateY(-50%);
            color: var(--text-muted);
        }
        .card-input-icon svg { width: 20px; height: 20px; }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #111318;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background .2s;
            margin-bottom: 16px;
        }
        .login-btn:hover { background: var(--accent-hover); }
        .login-btn:disabled { opacity: .5; cursor: not-allowed; }

        .status {
            font-size: 13px;
            min-height: 20px;
            transition: all .3s;
        }
        .status.error { color: var(--negative); }
        .status.success { color: var(--positive); }
        .status.scanning { color: var(--accent); }

        .pulse {
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: .4; }
            50% { opacity: 1; }
        }

        .scan-hint {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 12px;
        }
        .scan-hint svg { width: 16px; height: 16px; flex-shrink: 0; }

        .nfc-btn {
            width: 100%;
            padding: 14px;
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all .2s;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .nfc-btn:hover { background: rgba(138,180,248,.1); }
        .nfc-btn.active {
            background: rgba(138,180,248,.12);
            border-color: var(--positive);
            color: var(--positive);
            animation: nfc-pulse 2s ease-in-out infinite;
        }
        @keyframes nfc-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(129,201,149,.3); }
            50% { box-shadow: 0 0 0 10px rgba(129,201,149,0); }
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 4px 0 20px;
            color: var(--text-muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .nfc-anim {
            width: 120px; height: 120px;
            margin: 0 auto 8px;
            position: relative;
        }
        .nfc-anim .ring {
            position: absolute;
            border: 2px solid var(--accent);
            border-radius: 50%;
            opacity: 0;
            animation: nfc-ring 2.5s ease-out infinite;
        }
        .nfc-anim .ring:nth-child(1) { width: 40px; height: 40px; top: 40px; left: 40px; animation-delay: 0s; }
        .nfc-anim .ring:nth-child(2) { width: 70px; height: 70px; top: 25px; left: 25px; animation-delay: 0.5s; }
        .nfc-anim .ring:nth-child(3) { width: 100px; height: 100px; top: 10px; left: 10px; animation-delay: 1s; }
        @keyframes nfc-ring {
            0% { transform: scale(.8); opacity: .6; }
            100% { transform: scale(1.2); opacity: 0; }
        }

        @media (max-width: 480px) {
            .login-card { padding: 36px 24px; }
            .login-title { font-size: 20px; }
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="nfc-anim" id="nfcAnim">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
    </div>

    <div class="login-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="5" width="20" height="14" rx="2"/>
            <line x1="2" y1="10" x2="22" y2="10"/>
        </svg>
    </div>

    <h1 class="login-title">Customer Report</h1>
    <p class="login-sub">Escanea tu tarjeta de acceso NFC para ingresar</p>

    <div class="card-input-wrap">
        <div class="card-input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
        </div>
        <input type="text" class="card-input" id="cardInput"
               placeholder="Pasa tu tarjeta..."
               autocomplete="off" autofocus>
    </div>

    <button class="login-btn" id="loginBtn" onclick="doLogin()">Ingresar</button>

    <div class="status" id="status">
        <span class="pulse scanning">Esperando tarjeta NFC...</span>
    </div>

    <button class="nfc-btn" id="nfcBtn" onclick="startNFC()" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px"><path d="M6 8.32a7.43 7.43 0 010 7.36"/><path d="M9.46 6.21a11.76 11.76 0 010 11.58"/><path d="M12.91 4.1a16.07 16.07 0 010 15.8"/><path d="M16.37 2a20.4 20.4 0 010 20"/></svg>
        Escanear con NFC del celular
    </button>

    <div class="divider" id="divider" style="display:none">
        <span>o escribe el UID manualmente</span>
    </div>

    <div class="scan-hint" id="hintDesktop">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        Acerca tu tarjeta al lector NFC o escribe el UID manualmente
    </div>
</div>

<script>
const API = window.location.origin + '/api';
const input = document.getElementById('cardInput');
const status = document.getElementById('status');
const loginBtn = document.getElementById('loginBtn');
const nfcBtn = document.getElementById('nfcBtn');
const divider = document.getElementById('divider');
const hintDesktop = document.getElementById('hintDesktop');
let nfcReader = null;
let nfcAbort = null;

// Check if already logged in
const session = sessionStorage.getItem('cr_user');
if (session) window.location.href = '/';

// ══════════ WEB NFC (Android Chrome) ══════════
const hasNFC = 'NDEFReader' in window;

if (hasNFC) {
    // Show NFC button, hide desktop hint
    nfcBtn.style.display = 'flex';
    divider.style.display = 'flex';
    hintDesktop.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:16px;height:16px;flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Toca el boton NFC y acerca tu tarjeta al celular';
    // Auto-start NFC on load
    startNFC();
}

async function startNFC() {
    if (!hasNFC) return;

    try {
        if (nfcAbort) nfcAbort.abort();
        nfcAbort = new AbortController();
        nfcReader = new NDEFReader();

        await nfcReader.scan({ signal: nfcAbort.signal });

        nfcBtn.classList.add('active');
        nfcBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px"><path d="M6 8.32a7.43 7.43 0 010 7.36"/><path d="M9.46 6.21a11.76 11.76 0 010 11.58"/><path d="M12.91 4.1a16.07 16.07 0 010 15.8"/><path d="M16.37 2a20.4 20.4 0 010 20"/></svg> NFC activo — acerca tu tarjeta';
        showStatus('NFC listo. Acerca tu tarjeta al celular...', 'scanning');

        nfcReader.addEventListener('reading', ({ serialNumber }) => {
            if (serialNumber && serialNumber !== '') {
                // Convert serial number format: xx:xx:xx:xx → XX:XX:XX:XX
                const uid = serialNumber.toUpperCase();
                input.value = uid;
                showStatus('Tarjeta detectada: ' + uid, 'success');
                // Auto-login
                doLoginWithUID(uid);
            }
        });

        nfcReader.addEventListener('readingerror', () => {
            showStatus('Error al leer tarjeta. Intenta de nuevo.', 'error');
        });

    } catch (err) {
        if (err.name === 'AbortError') return;
        if (err.name === 'NotAllowedError') {
            showStatus('Permiso NFC denegado. Activa NFC en ajustes.', 'error');
            nfcBtn.classList.remove('active');
            nfcBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px"><path d="M6 8.32a7.43 7.43 0 010 7.36"/><path d="M9.46 6.21a11.76 11.76 0 010 11.58"/><path d="M12.91 4.1a16.07 16.07 0 010 15.8"/><path d="M16.37 2a20.4 20.4 0 010 20"/></svg> Reintentar NFC';
        } else {
            showStatus('NFC no disponible: ' + err.message, 'error');
        }
    }
}

// ══════════ KEYBOARD / USB READER ══════════
input.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
        e.preventDefault();
        doLogin();
    }
});

document.addEventListener('click', e => {
    if (!e.target.closest('button')) input.focus();
});
input.focus();

// ══════════ LOGIN ══════════
async function doLoginWithUID(uid) {
    if (!uid) {
        showStatus('Pasa tu tarjeta o escribe el UID', 'error');
        return;
    }

    loginBtn.disabled = true;
    showStatus('Verificando...', 'scanning');

    try {
        const res = await fetch(API + '/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ cardUID: uid }),
        });
        const data = await res.json();

        if (data.ok) {
            if (nfcAbort) nfcAbort.abort();
            showStatus('Bienvenido, ' + data.user.name, 'success');
            sessionStorage.setItem('cr_user', JSON.stringify(data.user));
            setTimeout(() => window.location.href = '/', 800);
        } else {
            showStatus(data.error || 'Tarjeta no reconocida', 'error');
            input.value = '';
            input.focus();
        }
    } catch (err) {
        showStatus('Error de conexion', 'error');
    }

    loginBtn.disabled = false;
}

function doLogin() {
    doLoginWithUID(input.value.trim());
}

function showStatus(msg, type) {
    status.className = 'status ' + type;
    status.innerHTML = type === 'scanning'
        ? '<span class="pulse scanning">' + msg + '</span>'
        : msg;
}
</script>
</body>
</html>
